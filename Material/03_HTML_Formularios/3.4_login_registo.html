<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login e Registo | Oficina Verde</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="3.4_login_registo.css">
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Oficina Verde</h1>
        <p>Login ou registo rapido para aceder ao painel.</p>
      </header>

      <section class="forms">
        <form class="form">
          <h2>Login</h2>
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" placeholder="nome@email.com" required>
          <label for="login-password">Palavra-passe</label>
          <input type="password" id="login-password" name="password" minlength="6" required>
          <button type="submit" class="button">Entrar</button>
          <a class="link" href="#">Esqueci a palavra-passe</a>
        </form>

        <form class="form">
          <h2>Registo</h2>
          <label for="signup-name">Nome completo</label>
          <input type="text" id="signup-name" name="name" placeholder="Ana Silva" required>
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" placeholder="nome@email.com" required>
          <label for="signup-password">Palavra-passe</label>
          <input type="password" id="signup-password" name="password" minlength="6" required>
          <button type="submit" class="button button--outline">Criar conta</button>
          <p class="hint">Se ja tens conta, faz login ao lado.</p>
        </form>
      </section>
    </main>
  </body>
</html>
