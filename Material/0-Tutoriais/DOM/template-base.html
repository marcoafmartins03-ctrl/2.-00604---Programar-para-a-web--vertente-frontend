<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título da Página</title>
    <style>
        :root {
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #2d3748;
            background-color: #f7fafc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: min(960px, 100%);
            background: #ffffff;
            border-radius: 16px;
            padding: 32px;
            box-shadow:
                0 20px 25px -15px rgba(45, 55, 72, 0.35),
                0 10px 40px -20px rgba(56, 86, 122, 0.25);
        }

        header {
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            color: #1a365d;
        }

        header p {
            margin: 8px 0 0;
            color: #4a5568;
        }

        section {
            margin-bottom: 32px;
        }

        section h2 {
            margin-bottom: 12px;
            font-size: 1.5rem;
            color: #2b6cb0;
        }

        .card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            background: #f9fbfc;
            margin-bottom: 24px;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: #ffffff;
            cursor: pointer;
            margin-right: 8px;
            margin-top: 8px;
            font-size: 0.95rem;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 18px -12px rgba(49, 130, 206, 0.6);
        }

        button.secondary {
            background: linear-gradient(135deg, #718096, #4a5568);
        }

        .output {
            background: #1a202c;
            color: #edf2f7;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
            margin-top: 16px;
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 12px;
            }

            .wrapper {
                padding: 24px 18px;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Título principal</h1>
            <p>Descrição breve do que será praticado nesta página.</p>
        </header>

        <section>
            <h2>📝 Tópico 1</h2>
            <div class="card">
                <p>Coloca aqui o conteúdo de demonstração.</p>
                <button type="button">Executar ação</button>
                <div class="output" id="output-demo">Resultado/console</div>
            </div>
        </section>

        <section>
            <h2>🧪 Tópico 2</h2>
            <div class="card">
                <p>Outro exemplo para praticar.</p>
            </div>
        </section>
    </div>

    <script>
        // Adiciona o teu JavaScript aqui
        console.log('Template base carregado');
    </script>
</body>
</html>
