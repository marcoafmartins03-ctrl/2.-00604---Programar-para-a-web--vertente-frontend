<!DOCTYPE html>
<!--
========================================
LIÇÃO 1: HELLO WORLD - PRIMEIRO PROGRAMA HTML
========================================

Nesta lição vamos criar a nossa primeira página HTML:
o clássico "Hello World" que é o ponto de partida para todos os desenvolvedores web.

========================================
ESTRUTURA BÁSICA HTML
========================================
-->
<!-- lang define o idioma principal da página -->
<html lang="pt">
<head>
    <!-- charset define a codificação de caracteres -->
    <meta charset="UTF-8">
    <!-- viewport adapta a página ao ecrã dos dispositivos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title aparece no separador do browser -->
    <title>Hello World - Primeira Página</title>
</head>
<body>
    <!-- O nosso primeiro conteúdo HTML -->
    <!-- h1 é o título principal; p é um parágrafo -->
    <h1>Hello World</h1>
    <p>Esta é a minha primeira página web!</p>
</body>
</html>
