<!DOCTYPE html>
<!--
========================================
LIÇÃO 8.1: Frameworks CSS (Bootstrap)
========================================

Frameworks como Bootstrap oferecem classes utilitárias prontas
para acelerar a construção de interfaces consistentes.

PASSOS PRINCIPAIS
1. Ligar a folha de estilos do framework (CDN).
2. Usar classes já existentes para layout, cores e espaçamentos.
3. Personalizar apenas quando necessário.

DETALHE TÉCNICO IMPORTANTE
- Bootstrap NÃO cria elementos HTML automaticamente.
- Tu continuas a escrever tags nativas (<div>, <button>, <nav>, ...).
- O Bootstrap fornece classes CSS (ex: btn, container, row, card).
- O JavaScript do Bootstrap é opcional e só é necessário para
  componentes interativos (collapse, dropdown, modal, offcanvas...).

========================================
EXEMPLO PRÁTICO
========================================
-->
<html lang="pt">
<head>
  <!-- UTF-8 evita problemas com acentos -->
  <meta charset="utf-8" />
  <!-- Viewport responsiva para adaptar em telemóvel -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap — painel de incidentes</title>
  <!-- CDN do Bootstrap (versão simplificada para demonstração) -->
  <!-- Este ficheiro carrega apenas CSS: foco no estilo/layout -->
  <!-- integrity + crossorigin ativam SRI: o browser valida se o ficheiro foi alterado -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
</head>
<body class="bg-light">
  <!-- bg-light vem do CSS do Bootstrap; body continua a ser HTML normal -->
  <!-- class="bg-light" aplica fundo claro do Bootstrap -->
  <!-- class="container" centra e limita a largura -->
  <!-- py-4 = padding vertical (top e bottom) com escala de spacing do Bootstrap -->
  <main class="container py-4">
    <h1 class="mb-4">Centro de Operações de Segurança</h1>

    <!-- Cartões prontos usando classes Bootstrap -->
    <!-- row cria linha de colunas; g-3 define o espaçamento -->
    <!-- O grid do Bootstrap tem 12 colunas: col-md-4 ocupa 4/12 em ecrãs md+ -->
    <div class="row g-3">
      <section class="col-md-4">
        <!-- <section> e <div> são elementos HTML nativos; Bootstrap só estiliza -->
        <!-- card cria um bloco; border-danger e bg-danger usam cores prontas -->
        <div class="card border-danger">
          <!-- card-header/card-body seguem estrutura recomendada do componente Card -->
          <div class="card-header bg-danger text-white">Críticos</div>
          <div class="card-body">
            <p class="card-text">2 incidentes por resolver</p>
            <!-- btn e btn-danger criam botao com estilo Bootstrap -->
            <!-- btn-sm reduz altura e padding do botão -->
            <button class="btn btn-danger btn-sm">Ver detalhes</button>
          </div>
        </div>
      </section>

      <section class="col-md-4">
        <!-- col-md-4 divide a linha em 3 colunas a partir de ecrãs médios -->
        <div class="card border-warning">
          <!-- bg-warning destaca o cabecalho -->
          <!-- text-white não é usada aqui para manter contraste com amarelo claro -->
          <div class="card-header bg-warning">Alertas</div>
          <div class="card-body">
            <p class="card-text">5 alertas moderados</p>
            <button class="btn btn-outline-warning btn-sm">Filtrar</button>
          </div>
        </div>
      </section>

      <section class="col-md-4">
        <!-- Mesmo padrão de card para manter consistência visual -->
        <div class="card border-success">
          <!-- Combinação bg-success + text-white garante contraste adequado -->
          <div class="card-header bg-success text-white">Sistemas</div>
          <div class="card-body">
            <p class="card-text">Backups concluídos</p>
            <button class="btn btn-success btn-sm">Exportar relatório</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Neste exemplo não há bootstrap.bundle.js porque não usamos componentes com JS -->
</body>
</html>
