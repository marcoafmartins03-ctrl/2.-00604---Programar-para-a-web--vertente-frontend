<!DOCTYPE html>
<!--
========================================
LIÇÃO 4.2: Box Model
========================================

Cada elemento em CSS é uma caixa com quatro camadas:
- Conteúdo (content)
- Padding (espaço interno)
- Border (borda)
- Margin (espaço externo)

========================================
EXEMPLO PRÁTICO
========================================
-->
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Box Model — alerta destacado</title>
  <!-- CSS externo (ficheiro dedicado) -->
  <link rel="stylesheet" href="4.2_box_model.css" />
</head>
<body>
  <!-- class="alerta" aplica o seletor .alerta no CSS -->
  <article class="alerta">
    <h2>Firewall</h2>
    <p>Porta 3389 bloqueada por tentativa de intrusão.</p>
  </article>
</body>
</html>
