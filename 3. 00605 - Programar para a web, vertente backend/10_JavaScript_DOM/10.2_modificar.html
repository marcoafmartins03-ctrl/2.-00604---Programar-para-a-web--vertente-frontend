<!DOCTYPE html>
<!--
========================================
LIÇÃO 10.2: Modificar Elementos DOM
========================================

Depois de selecionar, podemos modificar:
- textContent: texto do elemento
- innerHTML: HTML dentro do elemento
- style: estilos CSS
- classList: adicionar/remover classes
- setAttribute: atributos HTML
========================================
-->
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DOM: Modificar Elementos</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 { color: #10b981; }
    .caixa {
      background: #f1f5f9;
      padding: 20px;
      margin: 10px 0;
      border-radius: 8px;
      transition: all 0.3s;
    }
    .destaque {
      background: #fef3c7 !important;
      border: 2px solid #f59e0b;
    }
    .erro {
      background: #fee2e2 !important;
      border: 2px solid #dc2626;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-azul { background: #3b82f6; color: white; }
    .btn-verde { background: #10b981; color: white; }
    .btn-vermelho { background: #dc2626; color: white; }
  </style>
</head>
<body>

  <h1>Lição 10.2: Modificar Elementos</h1>

  <p id="mensagem">Este texto vai ser modificado pelo JavaScript.</p>

  <div id="caixa-demo" class="caixa">
    <h2 id="titulo-caixa">Título Original</h2>
    <p id="conteudo-caixa">Conteúdo original da caixa.</p>
  </div>

  <div>
    <button class="btn-azul" id="btn-texto">Mudar Texto</button>
    <button class="btn-verde" id="btn-estilo">Mudar Estilo</button>
    <button class="btn-vermelho" id="btn-classe">Toggle Classe</button>
    <button id="btn-reset">Reset</button>
  </div>

  <script src="10.2_modificar.js"></script>
</body>
</html>
