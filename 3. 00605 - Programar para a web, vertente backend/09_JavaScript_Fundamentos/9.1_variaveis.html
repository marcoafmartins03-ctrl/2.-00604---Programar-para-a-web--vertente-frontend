<!DOCTYPE html>
<!--
========================================
LIÇÃO 9.1: Variáveis em JavaScript
========================================

Para usar este ficheiro:
1. Abre no browser
2. Abre a Consola (F12 > Console)
3. Vê os resultados do JavaScript

O código está no ficheiro 9.1_variaveis.js
========================================
-->
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JS: Variáveis</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { color: #f59e0b; }
    .instrucoes {
      background: white;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #f59e0b;
    }
    code {
      background: #fef3c7;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Lição 9.1: Variáveis</h1>

  <div class="instrucoes">
    <h2>Instruções</h2>
    <ol>
      <li>Abre a <strong>Consola do Browser</strong> (F12 → Console)</li>
      <li>Vê os resultados do JavaScript</li>
      <li>O código está em <code>9.1_variaveis.js</code></li>
    </ol>

    <h3>Conceitos desta lição:</h3>
    <ul>
      <li><code>const</code> — valores que não mudam</li>
      <li><code>let</code> — valores que podem mudar</li>
      <li><code>console.log()</code> — mostrar valores na consola</li>
    </ul>
  </div>

  <!-- JavaScript externo -->
  <script src="9.1_variaveis.js"></script>
</body>
</html>
