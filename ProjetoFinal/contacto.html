<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto – Aprender English</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">
      <!-- Substitui a linha abaixo pelo teu logo: <img src="logo.png" alt="Logo"> -->
      <img src="assets/logo.png" alt="Logo">
      Aprender <span>English</span>
    </div>
    <ul>
      <li><a href="index.html">Início</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contacto.html" class="active">Contacto</a></li>
    </ul>
  </nav>

  <!-- CABEÇALHO -->
  <div class="page-header">
    <h1>Contacto</h1>
    <p>Tens alguma dúvida ou sugestão? Entra em contacto connosco.</p>
  </div>

  <!-- FORMULÁRIO -->
  <div class="contacto-wrap">
    <form class="formulario" action="#" method="post">

      <div class="campo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="O teu nome">
      </div>

      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="O teu e-mail">
      </div>

      <div class="campo">
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" placeholder="Escreve aqui a tua mensagem..."></textarea>
      </div>

      <button type="submit" class="btn-enviar">Enviar mensagem</button>

    </form>
  </div>

  <!-- RODAPÉ -->
  <footer>
    <p>&copy; 2025 <span>Aprender English</span> &mdash; Todos os direitos reservados</p>
  </footer>

</body>
</html>
