<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terceira aula</title>
</head>
<body>
    <h1>Olá!</h1>
    <p>Esta é uma aula</p>

    <!-- CTRL + TIL para comentar frases -->

    <!-- div: Divisória para agrupar conteúdo -->
    <!-- id: identificador único -->
    <!-- class: identificador de um conjunto de elementos -->
    <div id="batata" class="alimentos">
        <h2>ABC</h2>
        <h3>Def</h3>
        <p>Ghi</p>
        <p>Ghi</p>
    </div>

    <div id="cenoura" class="alimentos">
        <h2>ABC</h2>
        <br>
        <h3>Def</h3>
        <hr>
        <p>Ghi</p>
        <p>Ghi</p>
    </div>
    
    <!-- Tipos de link -->
    <!-- Link externo -->
    <!-- target = _blank: envia o link para um novo separador -->
    <a href="https://google.com" target="_blank">ISTO É UM LINK</a>

    <!-- Link interno: existem 2 tipos -->
    <a href="contactos.html">CONTACTOS</a> <!-- para outra página -->
    <a href="#batata">Ir para batata</a> <!-- para outra parte da mesma página -->

    <ul>
        <li><a href="https://google.com" target="_blank">ISTO É UM LINK</a></li>
        <li><a href="contactos.html">CONTACTOS</a></li>
        <li><a href="#batata">Ir para batata</a></li>
    </ul>

</body>
</html>
