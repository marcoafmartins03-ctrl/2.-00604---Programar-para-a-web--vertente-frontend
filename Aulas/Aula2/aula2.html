<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Isto é um comentário -->
    <!-- Isto é o título principal da página -->
    <h1>Vamos falar de elementos HTML</h1>
    <!-- Strong e o em são elementos semânticos: Melhor para SEO -->
    <p>Este é um <strong>parágrafo</strong> com <em>formatação</em></p>
    <!-- b e o i são elementos de formatação de texto -->
    <p>Este é um <b>parágrafo</b> com <i>formatação</i></p>

    <!-- IMG é uma tag que se fecha sozinha -->
    <img src="Red_Apple.jpg" alt="Isto é uma maçã" width="200" height="150">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Red_Apple.jpg/330px-Red_Apple.jpg" alt="Isto é uma maçã">
    <!-- Atributo = "Valor" -->
</body>
</html>
